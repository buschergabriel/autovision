<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUTOVISION — Rota</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --amarelo: #F5C800;
    --bg: #0A0A0A;
    --panel: #111111;
    --border: #1E1E1E;
    --text: #E0E0E0;
    --muted: #555;
    --green: #4CAF50;
    --orange: #F5A623;
    --purple: #C084FC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  #header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #header .logo { font-size: 11px; letter-spacing: 4px; color: var(--amarelo); font-weight: bold; }
  #header .subtitle { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

  /* INPUTS */
  #inputs {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .inp-group { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 80px; }
  .inp-label { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 2px;
    width: 100%;
    outline: none;
  }
  input:focus { border-color: var(--amarelo); }

  /* TOOLBAR */
  #toolbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 12px;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--amarelo); color: var(--amarelo); }
  .btn.active { background: #1A1500; border-color: var(--amarelo); color: var(--amarelo); }
  .btn.primary { background: var(--amarelo); border-color: var(--amarelo); color: #000; font-weight: bold; }
  .btn.primary:hover { background: #FFD700; }
  .btn.danger { border-color: #3A1010; color: #884444; }
  .btn.danger:hover { border-color: #FF4444; color: #FF4444; }

  /* MAP */
  #map { flex: 1; cursor: crosshair; }

  /* STATUS BAR */
  #status {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
    min-height: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  #status .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status .dot.yellow { background: var(--amarelo); box-shadow: 0 0 6px var(--amarelo); animation: pulse 1s infinite; }
  #status .dot.red { background: #FF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* RESULT PANEL */
  #result-panel {
    display: none;
    background: var(--panel);
    border-top: 2px solid var(--amarelo);
    padding: 12px 14px;
    flex-shrink: 0;
  }
  #result-panel.show { display: block; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result-block { }
  .result-label { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .result-value { font-size: 20px; font-weight: bold; color: var(--purple); }
  .result-value span { font-size: 10px; color: var(--muted); margin-left: 3px; }
  .result-value.orange { color: var(--orange); }
  .result-tag { display: inline-block; margin-top: 6px; font-size: 9px; padding: 3px 8px; border-radius: 2px; letter-spacing: 1px; }
  .result-tag.real { background: #0A1F0A; border: 1px solid #1A4A1A; color: var(--green); }
  .result-tag.est { background: #1A1200; border: 1px solid #3A2A00; color: var(--orange); }
  .start-info { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); }
  .start-info strong { color: var(--amarelo); }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo">AUTOVISION</div>
    <div class="subtitle">PLANEJADOR DE ROTA</div>
  </div>
  <div style="font-size:9px;color:#333;letter-spacing:1px;">v1.0</div>
</div>

<div id="inputs">
  <div class="inp-group">
    <div class="inp-label">Cliente</div>
    <input type="text" id="cliente" placeholder="ex: CYBER" value="CYBER"/>
  </div>
  <div class="inp-group">
    <div class="inp-label">Campanha</div>
    <input type="text" id="campanha" placeholder="ex: Junho 2026" value="Junho 2026"/>
  </div>
  <div class="inp-group" style="max-width:70px;">
    <div class="inp-label">Horas</div>
    <input type="number" id="horas" value="3" min="0.5" max="12" step="0.5"/>
  </div>
</div>

<div id="toolbar">
  <button class="btn active" id="btn-perim" onclick="setMode('perim')">✏ Perímetro</button>
  <button class="btn primary" id="btn-gerar" onclick="gerar()">▶ GERAR</button>
  <button class="btn danger" onclick="limpar()">✕ Limpar</button>
</div>

<div id="map"></div>

<div id="status">
  <div class="dot" id="dot"></div>
  <span id="status-text">Toque no mapa para desenhar o perímetro da área</span>
</div>

<div id="result-panel">
  <div class="result-grid">
    <div class="result-block">
      <div class="result-label">1 volta completa</div>
      <div class="result-value" id="r-volta-km">—<span>km</span></div>
      <div class="result-value" id="r-volta-t" style="font-size:16px;margin-top:2px;">—</div>
    </div>
    <div class="result-block">
      <div class="result-label" id="r-horas-label">— h de veiculação</div>
      <div class="result-value orange" id="r-voltas">—<span>voltas</span></div>
      <div class="result-value orange" id="r-total-km" style="font-size:16px;margin-top:2px;">—<span>km total</span></div>
    </div>
  </div>
  <div class="start-info" id="start-info"></div>
  <div id="r-tag"></div>
</div>

<script>
const SPEED_KMH = 15;
const OSRM = 'https://router.project-osrm.org';

// Map
const map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
map.setView([-30.0112, -51.0960], 14); // Rubem Berta, Porto Alegre

// State
let mode = 'perim';
let perimPts = [];
let perimLayer = null;
let routeLayer = null;
let startMarker = null;
let anchorsLayer = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.btn[id^=btn-]').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('btn-' + m);
  if (el) el.classList.add('active');
}

function setStatus(msg, state) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state ? ' ' + state : '');
}

// Map click
map.on('click', e => {
  const {lat, lng} = e.latlng;
  if (mode === 'perim') {
    perimPts.push([lat, lng]);
    drawPerim();
    if (perimPts.length === 1) setStatus('Continue tocando para definir o perímetro. Feche tocando próximo ao 1º ponto.', '');
    else setStatus(`${perimPts.length} pontos. Continue ou toque próximo ao início para fechar.`, '');
    // Auto-close if close to start
    if (perimPts.length > 3) {
      const [la, lo] = perimPts[0];
      const dist = Math.sqrt((lat-la)**2 + (lng-lo)**2) * 111320;
      if (dist < 80) {
        perimPts.pop();
        closePerim();
      }
    }
  }
});

function drawPerim() {
  if (perimLayer) map.removeLayer(perimLayer);
  if (perimPts.length < 2) {
    perimLayer = L.circleMarker(perimPts[0], {radius:5, color: '#F5C800', fillColor:'#F5C800', fillOpacity:1}).addTo(map);
    return;
  }
  const pts = [...perimPts, perimPts[0]];
  perimLayer = L.polyline(pts, {color:'#F5C800', weight:2, dashArray:'6,4', opacity:0.8}).addTo(map);
}

function closePerim() {
  if (perimLayer) map.removeLayer(perimLayer);
  perimLayer = L.polygon(perimPts, {color:'#F5C800', weight:2, fillColor:'#F5C800', fillOpacity:0.08}).addTo(map);
  setStatus(`Perímetro fechado — ${perimPts.length} pontos. Clique GERAR.`, 'green');
  setMode(null);
}

function limpar() {
  perimPts = [];
  [perimLayer, routeLayer, startMarker, anchorsLayer].forEach(l => { if(l) map.removeLayer(l); });
  perimLayer = routeLayer = startMarker = anchorsLayer = null;
  document.getElementById('result-panel').classList.remove('show');
  setStatus('Toque no mapa para desenhar o perímetro da área', '');
  setMode('perim');
}

// ── Geometry helpers ─────────────────────────────────────────
function ptInPoly(pt, poly) {
  let inside = false;
  const [px, py] = pt;
  for (let i = 0, j = poly.length-1; i < poly.length; j=i++) {
    const [xi,yi]=poly[i], [xj,yj]=poly[j];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function scanLine(poly, lat) {
  const xs = [];
  for (let i=0; i<poly.length; i++) {
    const [la,lo]=poly[i], [lb,lp]=poly[(i+1)%poly.length];
    if ((la<=lat&&lat<lb)||(lb<=lat&&lat<la))
      xs.push(lo + (lat-la)/(lb-la)*(lp-lo));
  }
  return xs.sort((a,b)=>a-b);
}

function coverageAnchors(poly, spacingM) {
  if (poly.length < 3) return [];
  const lats = poly.map(p=>p[0]);
  const [lo,hi] = [Math.min(...lats), Math.max(...lats)];
  const step = spacingM / 111320;
  const pts = [];
  for (let lat=lo+step*0.5; lat<=hi; lat+=step) {
    const xs = scanLine(poly, lat);
    for (let i=0; i<xs.length-1; i+=2) {
      pts.push([lat, (xs[i]+xs[i+1])/2]);
    }
  }
  return pts;
}

// Ponto ótimo de início: percorre borda e testa qual minimiza
// a soma de distâncias ao centroide das faixas mais extremas
// Na prática: escolhe ponto de borda mais próximo de uma esquina do bbox
function bestStartPoint(poly) {
  // Amostra 40 pontos na borda e escolhe o que está no "canto" mais exposto
  const pts = [];
  const n = poly.length;
  for (let i=0; i<n; i++) {
    const [la,lo]=poly[i], [lb,lp]=poly[(i+1)%n];
    for (let t=0; t<=1; t+=0.25) {
      pts.push([la+(lb-la)*t, lo+(lp-lo)*t]);
    }
  }
  const lats = poly.map(p=>p[0]), lons = poly.map(p=>p[1]);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const minLon=Math.min(...lons), maxLon=Math.max(...lons);
  const corners = [
    [minLat,minLon],[minLat,maxLon],
    [maxLat,minLon],[maxLat,maxLon]
  ];
  let bestPt = pts[0], bestScore = Infinity;
  for (const pt of pts) {
    const score = Math.min(...corners.map(c => Math.hypot(pt[0]-c[0], pt[1]-c[1])));
    if (score < bestScore) { bestScore=score; bestPt=pt; }
  }
  return bestPt;
}

function haversine(a,b) {
  const R=6371000, dLat=(b[0]-a[0])*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function downsample(pts, max) {
  if (pts.length<=max) return pts;
  const res=[], step=(pts.length-1)/(max-1);
  for (let i=0;i<max;i++) res.push(pts[Math.round(i*step)]);
  return res;
}

function fmtT(h) {
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  if(mm===60) return `${hh+1}h00`;
  return hh>0 ? `${hh}h${String(mm).padStart(2,'0')}` : `${mm}min`;
}

// ── OSRM /trip ────────────────────────────────────────────────
async function osrmTrip(pts) {
  const safe = downsample(pts, 90);
  const coords = safe.map(p=>`${p[1].toFixed(6)},${p[0].toFixed(6)}`).join(';');
  const radii  = safe.map(()=>'300').join(';');
  const url = `${OSRM}/trip/v1/driving/${coords}?roundtrip=true&source=first&overview=full&geometries=geojson&radiuses=${radii}`;
  const res = await fetch(url, {signal: AbortSignal.timeout(25000)});
  if (!res.ok) throw new Error('OSRM HTTP ' + res.status);
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('OSRM: ' + data.code);
  // Total distance
  const distM = data.trips[0].distance;
  const geom  = data.trips[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  return { distM, geom };
}

// Fallback: soma haversine dos pontos em ordem
function estimateDist(pts) {
  let d=0;
  for (let i=0;i<pts.length-1;i++) d+=haversine(pts[i],pts[i+1]);
  d+=haversine(pts[pts.length-1],pts[0]);
  return d;
}

// ── GERAR ─────────────────────────────────────────────────────
async function gerar() {
  if (perimPts.length < 3) {
    setStatus('Desenhe o perímetro primeiro (mínimo 3 pontos)', 'red');
    return;
  }
  // Fechar perímetro se ainda aberto
  if (perimLayer && !(perimLayer instanceof L.Polygon)) closePerim();

  const horas = parseFloat(document.getElementById('horas').value) || 3;
  const cliente = document.getElementById('cliente').value || '—';
  const campanha = document.getElementById('campanha').value || '—';

  setStatus('Calculando ponto de início ótimo...', 'yellow');

  // 1. Âncoras de cobertura (espaçamento ~150m)
  const anchors = coverageAnchors(perimPts, 150);
  if (anchors.length < 2) { setStatus('Área muito pequena — aumente o perímetro', 'red'); return; }

  // 2. Ponto de início ótimo
  const startPt = bestStartPoint(perimPts);
  const allPts = [startPt, ...anchors];

  // 3. Mostrar âncoras no mapa (debug visual leve)
  if (anchorsLayer) map.removeLayer(anchorsLayer);
  // não mostramos âncoras pra não poluir

  // 4. Mostrar ponto de início
  if (startMarker) map.removeLayer(startMarker);
  startMarker = L.circleMarker(startPt, {
    radius: 8, color: '#F5C800', fillColor: '#F5C800', fillOpacity: 1, weight: 2
  }).addTo(map).bindPopup(`<b>PONTO DE INÍCIO</b><br>${startPt[0].toFixed(5)}, ${startPt[1].toFixed(5)}`);

  setStatus('Calculando rota via ruas reais (OSRM)...', 'yellow');

  let distM, geom, viaRua = true;

  try {
    const result = await osrmTrip(allPts);
    distM = result.distM;
    geom  = result.geom;
  } catch(e) {
    console.warn('OSRM falhou, usando estimativa:', e);
    viaRua = false;
    distM = estimateDist(allPts);
    geom = [...allPts, allPts[0]];
  }

  // 5. Desenhar rota
  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.polyline(geom, {
    color: viaRua ? '#C084FC' : '#F5A623',
    weight: 3,
    opacity: 0.85
  }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), {padding:[30,30]});

  // 6. Calcular resultados
  const voltaKm   = distM / 1000;
  const voltaHr   = voltaKm / SPEED_KMH;
  const voltas    = Math.floor(horas / voltaHr);
  const totalKm   = voltas * voltaKm;

  // 7. Mostrar painel
  document.getElementById('r-volta-km').innerHTML = `${voltaKm.toFixed(1)}<span>km</span>`;
  document.getElementById('r-volta-t').innerHTML  = fmtT(voltaHr);
  document.getElementById('r-horas-label').textContent = `${horas}h de veiculação`;
  document.getElementById('r-voltas').innerHTML   = `${voltas}<span>volta${voltas!==1?'s':''}</span>`;
  document.getElementById('r-total-km').innerHTML = `${totalKm.toFixed(1)}<span>km total</span>`;

  // Ponto de início em coordenadas
  const startStr = `${startPt[0].toFixed(5)}, ${startPt[1].toFixed(5)}`;
  document.getElementById('start-info').innerHTML =
    `<strong>▶ INÍCIO:</strong> ${startStr} &nbsp;·&nbsp; ${cliente} / ${campanha}`;

  document.getElementById('r-tag').innerHTML =
    `<span class="result-tag ${viaRua?'real':'est'}">${viaRua?'🛣 VIA RUAS REAIS':'≈ ESTIMATIVA LINHA RETA'}</span>`;

  document.getElementById('result-panel').classList.add('show');
  setStatus(`Rota gerada — ${anchors.length} pontos de cobertura · ${viaRua?'OSRM real':'estimativa'}`, 'green');
}
</script>
</body>
</html>
